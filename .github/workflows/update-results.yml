name: Update results on Typst version bump

on:
  pull_request:
    paths:
      - "Cargo.toml"

# Default to read-only; the job that pushes opts into write explicitly below.
permissions:
  contents: read

jobs:
  update-results:
    # Authenticate the actor, not just the branch name: github.head_ref is
    # attacker-controllable, so a branch-name prefix alone does not prove the
    # PR comes from Renovate.
    if: github.actor == 'renovate[bot]' && startsWith(github.head_ref, 'renovate/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          # Do not persist the token in .git/config: the cargo build/run below
          # executes repository code, and a persisted credential would be
          # readable by it. The push step re-authenticates explicitly instead.
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run cargo run to regenerate results
        run: cargo run > result.txt

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add result.txt result.md
          git diff --cached --quiet && exit 0
          git commit -m "Update results for new Typst version"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_HEAD_REF}"
