name: Update results on Typst version bump

on:
  pull_request:
    paths:
      - "Cargo.toml"

permissions:
  contents: write

jobs:
  update-results:
    # Only run on Renovate PRs
    if: startsWith(github.head_ref, 'renovate/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run cargo run to regenerate results
        run: cargo run > result.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add result.txt result.md
          git diff --cached --quiet || git commit -m "Update results for new Typst version"
          git push
